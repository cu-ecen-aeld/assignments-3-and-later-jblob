name: assignment-test
on:
  push:
    tags-ignore:
      - '*'
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
        with:
          clean: false
          submodules: 'recursive'

      - uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run build
        run: |
          # 1. Surgical Cleanup
          rm -f ${GITHUB_WORKSPACE}/build/bitbake.lock
          rm -rf ${GITHUB_WORKSPACE}/build/tmp/work/cortexa57-poky-linux/shadow

          # 2. Run as root (-u 0) to install dependencies, then execute build.sh
          # Note: Most Yocto scripts (like build.sh) will handle dropping 
          # privileges or switching back to a standard user internally.
          docker run --rm -u 0 \
            -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
            -e GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" \
            -e BB_SERVER_TIMEOUT=0 \
            -e BB_HASHSERVE="" \
            -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
            --workdir=${GITHUB_WORKSPACE} \
            cuaesd/aesd-autotest:24-assignment6-yocto \
            bash -c "apt-get update && apt-get install -y libcrypt-dev && runuser -u builduser -- ./build.sh"

      - name: Run full test
        timeout-minutes: 15
        run: |
          docker run --rm \
            -e BB_SERVER_TIMEOUT=0 \
            -e BB_HASHSERVE="" \
            -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
            --workdir=${GITHUB_WORKSPACE} \
            cuaesd/aesd-autotest:24-assignment6-yocto \
            ./full-test.sh
