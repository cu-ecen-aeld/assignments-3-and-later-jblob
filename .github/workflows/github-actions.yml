name: assignment-test
on:
  push:
    tags-ignore:
      - '*'
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
        with:
          clean: false
          submodules: 'recursive'

      - uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run build
        run: |
          # 1. Clean up any existing locks
          rm -f ${GITHUB_WORKSPACE}/build/bitbake.lock
          
          # 2. Targeted wipe of the shadow recipe's work directory 
          # Forces re-run of do_configure to pick up libxcrypt changes
          rm -rf ${GITHUB_WORKSPACE}/build/tmp/work/cortexa57-poky-linux/shadow
          
          # 3. Run the actual build script
          docker run --rm \
            -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
            -e GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" \
            -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
            cuaesd/aesd-autotest:24-assignment6-yocto \
            --workdir=${GITHUB_WORKSPACE} \
            ./build.sh

      - name: Run full test
        timeout-minutes: 15
        run: |
          # Run the autograder script
          docker run --rm \
            -e BB_SERVER_TIMEOUT=0 \
            -e BB_HASHSERVE="" \
            -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
            cuaesd/aesd-autotest:24-assignment6-yocto \
            --workdir=${GITHUB_WORKSPACE} \
            ./full-test.sh
