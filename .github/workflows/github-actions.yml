name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted

    container:
      image: cuaesd/aesd-autotest:24-assignment7-buildroot
      options: -v /home/jblob/yocto-cache:/yocto-cache -v /home/jblob/yocto-build:/build

    env:
      GIT_SSL_NO_VERIFY: "true"

    steps:
      - name: Disable SSL verification
        run: |
          git config --global http.sslVerify false

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies + locale + socat
        run: |
          apt-get update
          apt-get install -y locales python3-distutils gawk chrpath diffstat lz4 zstd unzip build-essential socat iproute2
          echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
          locale-gen

      - name: Setup builder user and workspace
        run: |
          useradd -m builder || true
          rm -rf build
          ln -s /build build
          mkdir -p build/conf
          chown -R builder:builder .
          chown -R builder:builder /build
          chown -R builder:builder /yocto-cache || true

      - name: Start dynamic port forward
        run: |
          (while true; do
             for port in 2222 10022 10023 10024 10025; do
               nc -z localhost $port && socat TCP-LISTEN:10022,fork TCP:localhost:$port
             done
             sleep 1
           done) &

      - name: Configure Yocto cleanly (HEREDOC = no quoting errors)
        run: |
          su builder -s /bin/bash <<'EOF'

          mkdir -p build/conf

          if [ ! -f build/conf/local.conf ]; then
            echo 'CONF_VERSION = "2"' > build/conf/local.conf
          fi

          sed -i '/DL_DIR/d; /SSTATE_DIR/d; /SSTATE_MIRRORS/d; /TMPDIR/d; /MACHINE/d' build/conf/local.conf

          echo 'DL_DIR = "/yocto-cache/downloads"' >> build/conf/local.conf

          echo 'SSTATE_DIR = "/yocto-cache/sstate-cache"' >> build/conf/local.conf
          echo 'SSTATE_MIRRORS = "file://.* file:///yocto-cache/sstate-cache/PATH"' >> build/conf/local.conf

          echo 'TMPDIR = "/build/tmp"' >> build/conf/local.conf

          echo 'MACHINE = "qemuarm64"' >> build/conf/local.conf
          echo 'EXTRA_IMAGE_FEATURES = "debug-tweaks"' >> build/conf/local.conf
          echo 'INHERIT += "extrausers"' >> build/conf/local.conf
          echo 'EXTRA_USERS_PARAMS = "usermod -p '\'''\'' root;"' >> build/conf/local.conf

          # Zwingt QEMU, alles direkt auf stdout auszugeben (keine GUI)
          echo 'TEST_RUNQEMU_PARAM = "nographic"' >> build/conf/local.conf

          # Schaltet das Log-Level im QEMU-Kernel auf Maximum, damit jede /dev/kmsg-Meldung sofort auf der Konsole erscheint
          echo 'APPEND:append = " console=ttyAMA0 loglevel=8"' >> build/conf/local.conf

          # Sichert den gesamten Boot- und Konsolenverlauf in den Yocto-Logs
          echo 'IMAGE_CLASSES += "testimage"' >> build/conf/local.conf

          EOF

      - name: Run full test
        run: |
          su builder -s /bin/bash <<'EOF'

          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          export HOME=/home/builder

          ROOTDIR=$(pwd)

          source poky/oe-init-build-env build

          bitbake-layers add-layer $ROOTDIR/meta-aesd

          cd $ROOTDIR
          
          ###
          # --- NEU: Ein Hintergrund-Dienst, der periodisch prüft, ob QEMU online ist, und dmesg zyklisch wegschreibt ---
          (
            echo "Starte dmesg-Hintergrund-Sammler..."
            for i in {1..300}; do # Läuft max 5 Minuten
              if nc -z localhost 10022; then
                echo "=== LIVE KERNEL LOG LOGGED TO WORKSPACE ==="
                ssh -q -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 10022 root@localhost "dmesg" > $ROOTDIR/qemu_kernel.log || true
              fi
              sleep 2
            done
          ) &
          COLLECTOR_PID=$!

          ###
          ./full-test.sh
          
          ###
          TEST_EXIT_CODE=$?

          # Hintergrund-Sammler stoppen
          kill $COLLECTOR_PID 2>/dev/null || true

          # Gesammeltes Log am Ende in GitHub-Konsole ausgeben
          echo "=================================================="
          echo "=== ARCHIVED KERNEL LOGS FROM RUN TIME ==="
          echo "=================================================="
          if [ -f $ROOTDIR/qemu_kernel.log ]; then
            cat $ROOTDIR/qemu_kernel.log | tail -n 150
          else
            echo "WARNUNG: Es wurden während des Testlaufs keine Logs erfasst (QEMU SSH war nie erreichbar)."
          fi

          ###
          
          # Mit dem echten Testergebnis abbrechen/beenden
          exit $TEST_EXIT_CODE ###

          EOF
