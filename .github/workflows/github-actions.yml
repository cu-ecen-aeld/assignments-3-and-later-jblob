name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  yocto-build:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
          clean: true

      - name: Restore Yocto cache (DL + sstate)
        uses: actions/cache@v3
        with:
          path: |
            ~/yocto-cache/downloads
            ~/yocto-cache/sstate-cache
          key: yocto-${{ runner.os }}-poky
          restore-keys: |
            yocto-${{ runner.os }}-

      - name: Run Yocto full test (cached)
        shell: bash
        run: |
          set -e

          export YOCTO_CACHE=$HOME/yocto-cache
          export DL_DIR=$YOCTO_CACHE/downloads
          export SSTATE_DIR=$YOCTO_CACHE/sstate-cache
          mkdir -p "$DL_DIR" "$SSTATE_DIR"

          export MACHINE=qemuarm64
          export BUILD_DIR=build-${MACHINE}

          mkdir -p build-${MACHINE}/conf
          CONF=build-${MACHINE}/conf/local.conf

          echo 'DL_DIR = "${HOME}/yocto-cache/downloads"' >> $CONF
          echo 'SSTATE_DIR = "${HOME}/yocto-cache/sstate-cache"' >> $CONF
          sed -i '/^BB_HASHSERVE/d' $CONF

          ./full-test.sh
