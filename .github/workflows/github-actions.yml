name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted

    container:
        image: cuaesd/aesd-autotest:24-assignment7-buildroot
        options: -u 1000:1000 -v /home/jblob/yocto-cache:/yocto-cache -v /home/jblob/yocto-build:/build
  
    steps:
      - uses: actions/checkout@v2

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          apt-get update || true
          apt-get install -y \
            gawk chrpath diffstat lz4 zstd unzip \
            python3 python3-distutils build-essential locales || true

      - name: Setup Yocto cache
        run: |
          mkdir -p build/conf
          echo 'DL_DIR = "/yocto-cache/downloads"' >> build/conf/local.conf
          echo 'SSTATE_DIR = "/yocto-cache/sstate-cache"' >> build/conf/local.conf

      - name: Run full test
        run: |
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          export LANGUAGE=C.UTF-8
          ./full-test.sh
