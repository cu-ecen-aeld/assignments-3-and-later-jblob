name: assignment-test
on:
  push:
    tags-ignore:
      - '*'
    branches:
      - '*'

jobs:
  # Job 1: Build the Buildroot image
  full-test-assignment5buildroot:
    container: 
        image: cuaesd/aesd-autotest:24-assignment5-buildroot
        options: --user 1000:1000
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v2
      
      - name: Checkout submodules
        run: git submodule update --init --recursive
        
      - name: Cleanup previous runs
        run: killall -9 qemu-system-aarch64 || true
        
      - name: Install sshpass
        run: |
          apt-get update
          apt-get install -y sshpass
          
      - name: Run unit test
        run: ./unit-test.sh

  # Job 2: Run the full QEMU integration test
  full-test-assignment5final:
    needs: full-test-assignment5buildroot
    # We run this directly on the self-hosted host (Ubuntu 22) 
    # to ensure QEMU and the test script share the same localhost.
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
      
      - name: Checkout submodules
        run: git submodule update --init --recursive
        
      - name: Cleanup previous runs
        run: killall -9 qemu-system-aarch64 || true
        
      - name: Install dependencies on host
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          
      - name: Run full test
        run: ./full-test.sh
