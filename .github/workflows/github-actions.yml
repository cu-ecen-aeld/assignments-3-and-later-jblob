name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
          clean: true

      - name: Run Yocto full test (isolated build dirs)
        shell: bash
        run: |
          set -e

          export YOCTO_DIR=$PWD
          
          # Build for qemux86-64
          export MACHINE=qemux86-64
          export BUILD_DIR=build-${MACHINE}
          ./full-test.sh

          # Build for qemuarm64
          export MACHINE=qemuarm64
          export BUILD_DIR=build-${MACHINE}
          ./full-test.sh
