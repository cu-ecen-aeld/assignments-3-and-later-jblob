name: assignment-test
on:
  push:
    tags-ignore:
      - '*'
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
        with:
          clean: false
          submodules: 'recursive'

      - uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run build
        run: |
          # 1. Surgical Cleanup
          rm -f ${GITHUB_WORKSPACE}/build/bitbake.lock
          rm -rf ${GITHUB_WORKSPACE}/build/tmp/work/cortexa57-poky-linux/shadow

          # 2. Run the build
          # We use 'sudo -n' (non-interactive) to fail fast if it asks for a password,
          # or simply try without sudo if the container user is already root.
          docker run --rm \
            -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
            -e GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" \
            -e BB_SERVER_TIMEOUT=0 \
            -e BB_HASHSERVE="" \
            -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
            --workdir=${GITHUB_WORKSPACE} \
            cuaesd/aesd-autotest:24-assignment6-yocto \
            bash -c "sudo apt-get update && sudo apt-get install -y libcrypt-dev && ./build.sh"
      - name: Run full test
        timeout-minutes: 15
        run: |
          docker run --rm \
            -e BB_SERVER_TIMEOUT=0 \
            -e BB_HASHSERVE="" \
            -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
            --workdir=${GITHUB_WORKSPACE} \
            cuaesd/aesd-autotest:24-assignment6-yocto \
            ./full-test.sh
