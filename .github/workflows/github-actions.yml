name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  full-test:
    runs-on: self-hosted

    container:
      image: cuaesd/aesd-autotest:24-assignment7-buildroot
      options: |
        -v /home/jblob/yocto-cache:/yocto-cache
        -v /home/jblob/yocto-build:/build

    steps:
      - uses: actions/checkout@v2

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          apt-get update || true
          apt-get install -y \
            gawk \
            chrpath \
            diffstat \
            lz4 \
            zstd \
            unzip \
            python3 \
            python3-distutils \
            build-essential \
            locales || true

      - name: Setup locale
        run: |
          echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
          dpkg-reconfigure --frontend=noninteractive locales

      - name: Setup Yocto cache
        run: |
          mkdir -p /build/conf

          echo 'DL_DIR = "/yocto-cache/downloads"' >> /build/conf/local.conf
          echo 'SSTATE_DIR = "/yocto-cache/sstate-cache"' >> /build/conf/local.conf

      - name: Create non-root user
        run: |
          useradd -m builder
          chown -R builder:builder /__w
          chown -R builder:builder /build || true

      - name: Run full test
        run: |
          su builder -c "
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
            export LANGUAGE=en_US.UTF-8
            ./full-test.sh
          "
