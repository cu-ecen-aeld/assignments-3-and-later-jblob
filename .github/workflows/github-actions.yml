name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  yocto-build:
    runs-on: self-hosted
    timeout-minutes: 360   # 6 Stunden Sicherheitsnetz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
          clean: true

      - name: Restore Yocto cache (DL + sstate)
        uses: actions/cache@v3
        with:
          path: |
            ~/yocto-cache/downloads
            ~/yocto-cache/sstate-cache
          key: yocto-${{ runner.os }}-${{ hashFiles(
            'meta-aesd/**',
            '**/*.bb',
            '**/*.bbappend',
            '**/local.conf',
            '**/bblayers.conf'
          ) }}
          restore-keys: |
            yocto-${{ runner.os }}-

      - name: Run Yocto full test (cached)
        shell: bash
        run: |
          set -e

          # ---- Yocto cache locations ----
          export YOCTO_CACHE=$HOME/yocto-cache
          export DL_DIR=$YOCTO_CACHE/downloads
          export SSTATE_DIR=$YOCTO_CACHE/sstate-cache
          mkdir -p "$DL_DIR" "$SSTATE_DIR"

          # ---- Build configuration ----
          export MACHINE=qemuarm64
          export BUILD_DIR=build-${MACHINE}

          # ---- Run course-provided test ----
          ./full-test.sh
