name: assignment-test

on:
  push:
    branches:
      - '*'

jobs:
  yocto-build:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
          clean: true

      - name: Run Yocto build using persistent sstate
        shell: bash
        run: |
          set -e

          # --------------------------------------------------
          # PERSISTENTER CACHE (bereits vorhanden!)
          # --------------------------------------------------
          export DL_DIR=/home/jblob/yocto-cache/downloads
          export SSTATE_DIR=/home/jblob/yocto-cache/sstate-cache
          export BB_ENV_PASSTHROUGH_ADDITIONS="DL_DIR SSTATE_DIR"

          echo "Using DL_DIR=$DL_DIR"
          echo "Using SSTATE_DIR=$SSTATE_DIR"

          # --------------------------------------------------
          # PERSISTENTER BUILD-ORDNER (WICHTIG)
          # --------------------------------------------------
          export MACHINE=qemuarm64
          export BUILD_DIR=/home/jblob/yocto-build-${MACHINE}

          # Build-Verzeichnis bleibt zwischen Runs bestehen
          mkdir -p $BUILD_DIR/conf

          # local.conf sicher setzen
          CONF=$BUILD_DIR/conf/local.conf
          echo 'DL_DIR = "/home/jblob/yocto-cache/downloads"' >> $CONF
          echo 'SSTATE_DIR = "/home/jblob/yocto-cache/sstate-cache"' >> $CONF
          sed -i '/^BB_HASHSERVE/d' $CONF

          # --------------------------------------------------
          # TEST AUSFÜHREN
          # --------------------------------------------------
          ./full-test.sh
          
