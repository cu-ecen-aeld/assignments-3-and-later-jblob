name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
      full-test:
        runs-on: self-hosted
        steps:
          - uses: actions/checkout@v3
            with:
              clean: false
              submodules: 'recursive'
          - uses: webfactory/ssh-agent@v0.5.4
            with:
                 ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

          - name: Run build
            run: |
               # 1. Total Surgical Cleanup
               # Remove the lock
               rm -f ${GITHUB_WORKSPACE}/build/bitbake.lock
               
               # Remove WORK and STAMPS for the failing recipes
               # This forces BitBake to re-configure from scratch
               rm -rf ${GITHUB_WORKSPACE}/build/tmp/work/x86_64-linux/file-native
               rm -rf ${GITHUB_WORKSPACE}/build/tmp/stamps/x86_64-linux/file-native
               
               # Optional: If libxcrypt is still being moody
               rm -rf ${GITHUB_WORKSPACE}/build/tmp/work/cortexa57-poky-linux/libxcrypt
               rm -rf ${GITHUB_WORKSPACE}/build/tmp/stamps/cortexa57-poky-linux/libxcrypt

               # 2. Run the build
               docker run --rm \
                 -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
                 -e GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" \
                 -e BB_SERVER_TIMEOUT=0 \
                 -e BB_HASHSERVE="" \
                 -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
                 cuaesd/aesd-autotest:24-assignment6-yocto \
                 --workdir=${GITHUB_WORKSPACE} \
                 ./build.sh
          - name: Run full test
            timeout-minutes: 15
            run: |
               # Use identical tag and timeout settings to ensure consistency
               docker run --rm \
                 -e BB_SERVER_TIMEOUT=0 \
                 -e BB_HASHSERVE="" \
                 -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
                 cuaesd/aesd-autotest:24-assignment6-yocto \
                 --workdir=${GITHUB_WORKSPACE} \
                 ./full-test.sh
